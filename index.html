<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marks Average Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Marks Average Calculator</h1>

    <div class="form">
      <input type="number" id="sub1" placeholder="Subject 1 Marks" />
      <input type="number" id="sub2" placeholder="Subject 2 Marks" />
      <input type="number" id="sub3" placeholder="Subject 3 Marks" />

      <button onclick="calculateAverage()">Calculate</button>
    </div>

    <div class="result">
      <h2 id="output">Enter marks and click calculate</h2>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
